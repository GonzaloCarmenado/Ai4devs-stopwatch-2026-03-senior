<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Stopwatch / Countdown</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="web-container">
        <header class="header-bar">
            <span>Gonzalo Carmenado</span>
        </header>

        <main class="content-area">
            <div id="home-menu" class="component-container active-component">
                <div class="menu-layout">
                    <div id="select-stopwatch" class="menu-option">
                        <h1>Stopwatch</h1>
                        <div class="icon-container">
                            <svg class="arrow-up" viewBox="0 0 24 24">
                                <path d="M12 2l-10 10h6v10h8v-10h6z" />
                            </svg>
                        </div>
                    </div>

                    <div class="vertical-divider"></div>

                    <div id="select-countdown" class="menu-option">
                        <h1>Countdown</h1>
                        <div class="icon-container">
                            <svg class="arrow-down" viewBox="0 0 24 24">
                                <path d="M12 22l10-10h-6v-10h-8v10h-6z" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <div id="stopwatch-component" class="component-container">
                <div class="tool-layout">
                    <div class="display-container">
                        <span id="sw-display" class="large-display">00:00:00</span>
                        <span id="sw-ms" class="ms-display">000</span>
                    </div>
                    <div class="buttons-container two-buttons">
                        <button id="sw-start-stop" class="btn-tool btn-start">Start</button>
                        <button id="sw-clear" class="btn-tool btn-clear">Clear</button>
                    </div>
                </div>
            </div>

            <div id="countdown-component" class="component-container">
                <div class="tool-layout">
                    <div class="display-container">
                        <span id="cd-display" class="large-display">00:00:00</span>
                        <span id="cd-ms" class="ms-display">000</span>
                    </div>

                    <div id="cd-keyboard" class="keyboard-grid">
                        <button class="key btn-num" data-val="5">5</button>
                        <button class="key btn-num" data-val="6">6</button>
                        <button class="key btn-num" data-val="7">7</button>
                        <button class="key btn-num" data-val="8">8</button>
                        <button class="key btn-num" data-val="9">9</button>
                        <button id="cd-set-start" class="key btn-set span-2">Set</button>

                        <button class="key btn-num" data-val="0">0</button>
                        <button class="key btn-num" data-val="1">1</button>
                        <button class="key btn-num" data-val="2">2</button>
                        <button class="key btn-num" data-val="3">3</button>
                        <button class="key btn-num" data-val="4">4</button>
                        <button id="cd-clear-key" class="key btn-clear-key span-2">Clear</button>
                    </div>

                    <div id="cd-controls" class="buttons-container two-buttons hidden">
                        <button id="cd-start-stop" class="btn-tool btn-start">Start</button>
                        <button id="cd-clear" class="btn-tool btn-clear">Clear</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer-bar">
            <button id="go-back" class="btn-back hidden">
                <svg class="back-icon" viewBox="0 0 24 24">
                    <path d="M20 11h-12.17l5.59-5.59-1.42-1.41-8 8 8 8 1.41-1.41-5.58-5.59h12.17v-2z" />
                </svg>
                Back
            </button>
            <div class="spacer"></div>
            <button id="go-fullscreen" class="btn-action btn-fullscreen">
                <svg class="fullscreen-icon" viewBox="0 0 24 24">
                    <path d="M7 14h-3v3h-2v-5h5v2zm13-5h-3v-3h-2v5h5v-2zm-13-5v3h-3v2h5v-5h-2zm13 14h-3v3h-2v-5h5v2z" />
                </svg>
                Go Fullscreen
            </button>
        </footer>
    </div>

    <script src="script.js"></script>
    <style>
        /* --- Estilos Generales y Reset --- */
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --main-blue: #0040a8;
            /* Un azul más moderno */
            --display-bg: #e6e9f2;
            /* Color de fondo del display de la foto */
            --display-border: #444;
            /* Borde oscuro */
            --btn-green: #00e600;
            /* Verde brillante */
            --btn-red: #ff3333;
            /* Rojo brillante */
            --btn-grey: #b0b0b0;
            /* Gris */
            --btn-text: #fff;
            --btn-text-dark: #333;
            --arrow-green: #33ff33;
            /* Verde para la flecha */
            --arrow-red: #ff4d4d;
            /* Rojo para la flecha */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fuente limpia */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* Evitar barras de desplazamiento si es posible */
        }

        /* --- Contenedor Principal --- */
        .web-container {
            width: 900px;
            /* Un ancho fijo razonable, similar a la proporción de las fotos */
            height: 550px;
            /* Una altura fija para simular una ventana */
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            /* Para que la pantalla completa funcione mejor dentro */
        }

        /* Soporte para Pantalla Completa real */
        :fullscreen .web-container,
        :-webkit-full-screen .web-container,
        :-ms-fullscreen .web-container {
            width: 100vw;
            height: 100vh;
            box-shadow: none;
            border: none;
        }

        /* --- Barras Superior e Inferior --- */
        .header-bar,
        .footer-bar {
            background-color: var(--main-blue);
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-weight: bold;
        }

        .header-bar {
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .footer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
        }

        .spacer {
            flex-grow: 1;
        }

        /* --- Área de Contenido Principal --- */
        .content-area {
            flex-grow: 1;
            display: flex;
            position: relative;
            padding-bottom: 60px;
            /* Espacio para el footer */
        }

        /* --- Gestión de Componentes --- */
        .component-container {
            width: 100%;
            height: 89%;
            display: none;
            /* Oculto por defecto */
            position: absolute;
            top: 0;
            left: 0;
            justify-content: center;
            align-items: center;
        }

        .component-container.active-component {
            display: flex;
            /* Mostrar solo el activo */
        }

        /* --- Estilos del Menú General (Home) --- */
        .menu-layout {
            display: flex;
            width: 80%;
            height: 70%;
            align-items: center;
        }

        .menu-option {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 20px;
            border-radius: 10px;
            transition: background-color 0.3s;
        }

        .menu-option:hover {
            background-color: rgba(0, 64, 168, 0.05);
            /* Un toque de azul al pasar el ratón */
        }

        .menu-option h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #444;
        }

        .icon-container {
            width: 120px;
            height: 120px;
        }

        .vertical-divider {
            width: 2px;
            height: 100%;
            background-color: #eee;
            margin: 0 20px;
        }

        /* Estilos de los iconos SVG */
        .arrow-up,
        .arrow-down {
            width: 100%;
            height: 100%;
            stroke: black;
            stroke-width: 0.5;
        }

        .arrow-up {
            fill: var(--arrow-green);
        }

        .arrow-down {
            fill: var(--arrow-red);
        }


        /* --- Diseño Común para Herramientas (Cronómetro y Cuenta Atrás) --- */
        .tool-layout {
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* El Display de Tiempo */
        .display-container {
            background-color: var(--display-bg);
            border: 4px solid var(--display-border);
            border-radius: 20px;
            padding: 20px 40px;
            display: flex;
            align-items: baseline;
            justify-content: center;
            margin-bottom: 30px;
            min-width: 500px;
            user-select: none;
            /* No permitir seleccionar el texto */
        }

        .large-display {
            font-size: 8rem;
            /* Muy grande */
            font-weight: 500;
            color: #000;
            font-family: 'Courier New', Courier, monospace;
            /* Fuente monoespaciada para el tiempo */
        }

        .ms-display {
            font-size: 2.5rem;
            color: #444;
            margin-left: 10px;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Contenedor de Botones (Start/Stop/Clear) */
        .buttons-container {
            width: 100%;
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .two-buttons {
            justify-content: space-around;
        }

        /* Estilos Generales de Botones */
        .btn-tool {
            flex: 1;
            max-width: 300px;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #222;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            text-transform: capitalize;
        }

        .btn-tool:active {
            transform: translateY(2px);
            box-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.2);
        }

        .btn-start {
            background-color: var(--btn-green);
            color: var(--btn-text-dark);
        }

        .btn-stop {
            background-color: var(--btn-red);
            color: var(--btn-text);
        }

        .btn-clear {
            background-color: var(--btn-red);
            color: var(--btn-text);
        }

        /* Botones de Acción Inferiores */
        .btn-action,
        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: none;
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .btn-action:hover,
        .btn-back:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .fullscreen-icon,
        .back-icon {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* --- Teclado Numérico de Cuenta Atrás --- */
        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr) 2fr;
            /* 5 números y un botón ancho de control */
            grid-gap: 10px;
            width: 100%;
            max-width: 800px;
        }

        .key {
            padding: 15px;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 8px;
            border: 1px solid #888;
            cursor: pointer;
            text-align: center;
            user-select: none;
        }

        .btn-num {
            background-color: var(--btn-green);
            color: var(--btn-text-dark);
        }

        .btn-set {
            background-color: var(--btn-green);
            color: var(--btn-text-dark);
        }

        .btn-clear-key {
            background-color: var(--btn-grey);
            color: var(--btn-text-dark);
        }

        /* Utilidad para hacer botones más anchos */
        .span-2 {
            grid-row: span 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Utilidad para ocultar elementos */
        .hidden {
            display: none !important;
        }
    </style>
</body>

</html>
